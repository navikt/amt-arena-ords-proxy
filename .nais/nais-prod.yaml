kind: Application
apiVersion: nais.io/v1alpha1
metadata:
  name: amt-arena-ords-proxy
  namespace: amt
  labels:
    team: amt
spec:
  image: {{image}}
  port: 8080
  webproxy: true
  ingresses:
    - https://amt-arena-ords-proxy.prod-fss-pub.nais.io
  prometheus:
    enabled: true
    path: /internal/prometheus

  startup:
    path: /internal/health/liveness
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 10
  readiness:
    path: /internal/health/readiness
  liveness:
    path: /internal/health/liveness

  replicas:
    disableAutoScaling: true
    min: 1
    max: 1
  resources:
    requests:
      cpu: 20m
      memory: 335Mi
    limits:
      memory: 1024Mi
  azure:
    application:
      enabled: true
  env:
    - name: JDK_JAVA_OPTIONS
      value: "-Xshare:off --enable-native-access=ALL-UNNAMED --sun-misc-unsafe-memory-access=allow"
    - name: ARENA_ORDS_URL
      value: https://arena-ords.nais.adeo.no
  envFrom:
    - secret: amt-arena-ords-proxy
  accessPolicy:
    inbound:
      rules:
        - application: amt-arena-acl
          namespace: amt
          cluster: prod-gcp
        - application: aktivitet-arena-acl
          namespace: dab
          cluster: prod-gcp
        - application: mulighetsrommet-arena-adapter
          namespace: team-mulighetsrommet
          cluster: prod-gcp
